version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: taskforge-db
    environment:
      POSTGRES_DB: taskforge
      POSTGRES_USER: taskforge
      POSTGRES_PASSWORD: taskforge_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: taskforge-app
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      DATABASE_URL: postgresql://taskforge:taskforge_password@db:5432/taskforge
      FLASK_ENV: ${FLASK_ENV:-production}
    volumes:
      - ./app/uploads:/app/app/uploads
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
