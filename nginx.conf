server {
    listen 80;
    server_name taskforge.example.com;  # Change to your domain
    client_max_body_size 16M;

    # Redirect HTTP to HTTPS (uncomment after SSL setup)
    # return 301 https://$server_name$request_uri;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static files (optional - if serving directly)
    location /static {
        alias /var/www/taskforge/app/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Uploads (optional - if serving directly)
    location /uploads {
        alias /var/www/taskforge/app/uploads;
        expires 7d;
    }
}

